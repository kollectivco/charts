name: Production Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build_release:
    name: Build and Upload Release Archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          mkdir -p build/kontentainment-charts
          cp -r admin build/kontentainment-charts/
          cp -r inc build/kontentainment-charts/
          cp -r public build/kontentainment-charts/
          cp -r languages build/kontentainment-charts/ 2>/dev/null || :
          cp charts.php build/kontentainment-charts/
          cp readme.txt build/kontentainment-charts/ 2>/dev/null || :
          # Clean build from dev assets
          rm -rf build/kontentainment-charts/**/*.zip
          rm -rf build/kontentainment-charts/.git*
          rm -rf build/kontentainment-charts/.agent*
          rm -rf build/kontentainment-charts/tests
          
      - name: Create ZIP
        run: |
          cd build
          zip -r kontentainment-charts.zip kontentainment-charts/
          
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/kontentainment-charts.zip
          draft: false
          prerelease: false
          generate_release_notes: true
